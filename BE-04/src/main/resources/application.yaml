spring:
  application:
    name: BE-04

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}

    username: ${DB_USR}
    password: ${DB_PWD}
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true